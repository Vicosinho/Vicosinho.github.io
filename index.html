<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Music Player Local</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,Segoe UI,Arial;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* LOADING */
.loader{
  position:fixed;
  inset:0;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  transition:.6s;
}

.spinner{
  width:50px;
  height:50px;
  border:5px solid #1e293b;
  border-top:5px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.loader.hide{
  opacity:0;
  pointer-events:none;
}

/* PLAYER */
.player{
  width:360px;
  background:rgba(30,41,59,.75);
  backdrop-filter:blur(15px);
  border-radius:22px;
  padding:22px;
  box-shadow:0 20px 40px rgba(0,0,0,.5);
  text-align:center;
}

.cover{
  width:100%;
  height:220px;
  border-radius:16px;
  overflow:hidden;
  background:#020617;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h2{
  margin-top:12px;
  font-size:20px;
}

p{
  color:#94a3b8;
  font-size:14px;
}

/* progress */
.progress{
  width:100%;
  height:7px;
  background:#1e293b;
  border-radius:20px;
  margin:15px 0;
  cursor:pointer;
}

.progress-bar{
  height:100%;
  width:0%;
  border-radius:20px;
  background:linear-gradient(90deg,#3b82f6,#22c55e);
}

.time{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#94a3b8;
}

/* controls */
.controls{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:14px;
}

button{
  border:none;
  background:#1e293b;
  color:white;
  font-size:18px;
  padding:12px 15px;
  border-radius:12px;
  cursor:pointer;
  transition:.25s;
}

button:hover{
  background:#3b82f6;
}

.play{
  background:#3b82f6;
  font-size:22px;
}

/* volume */
.volume{
  margin-top:14px;
}

.volume input{
  width:100%;
}
</style>
</head>

<body>

<!-- LOADING -->
<div class="loader" id="loader">
  <div class="spinner"></div>
  <p style="margin-top:10px;color:#94a3b8">Carregando músicas...</p>
</div>

<div class="player">

  <div class="cover">
    <!-- capa local -->
    <img id="cover" src="musics/cover.png">
  </div>

  <h2 id="title">musica</h2>
  <p>Player local</p>

  <div class="progress" id="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div class="controls">
    <button id="prev">⏮</button>
    <button id="play" class="play">▶</button>
    <button id="next">⏭</button>
  </div>

  <div class="volume">
    🔊 Volume
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>

</div>

<!-- áudio local -->
<audio id="audio"></audio>

<script>
const loader = document.getElementById("loader");
const audio = document.getElementById("audio");

const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

const progress = document.getElementById("progress");
const progressBar = document.getElementById("progressBar");

const currentEl = document.getElementById("current");
const durationEl = document.getElementById("duration");

const volume = document.getElementById("volume");

/* ===== PLAYLIST LOCAL =====
   coloque seus arquivos dentro da pasta:

   /musics/
      musica.mp3
      musica2.mp3
      musica3.mp3
      cover.png
*/
const playlist = [
  "musics/musica.mp3",
  "musics/musica2.mp3",
  "musics/musica3.mp3"
];

let index = 0;
let isPlaying = false;

/* LOADING */
window.addEventListener("load",()=>{
  setTimeout(()=>loader.classList.add("hide"),800);
});

/* LOAD SONG */
function loadSong(i){
  audio.src = playlist[i];

  const name = playlist[i]
    .split("/")
    .pop()
    .replace(".mp3","");

  document.getElementById("title").textContent = name;
}

loadSong(index);

/* PLAY / PAUSE */
function playSong(){
  audio.play();
  isPlaying=true;
  playBtn.textContent="⏸";
}

function pauseSong(){
  audio.pause();
  isPlaying=false;
  playBtn.textContent="▶";
}

playBtn.onclick=()=> isPlaying?pauseSong():playSong();

/* NEXT */
nextBtn.onclick=()=>{
  index=(index+1)%playlist.length;
  loadSong(index);
  playSong();
};

/* PREV */
prevBtn.onclick=()=>{
  index=(index-1+playlist.length)%playlist.length;
  loadSong(index);
  playSong();
};

/* PROGRESS */
audio.addEventListener("timeupdate",()=>{
  const {duration,currentTime}=audio;

  const percent=(currentTime/duration)*100;
  progressBar.style.width=percent+"%";

  currentEl.textContent=formatTime(currentTime);
  durationEl.textContent=formatTime(duration);
});

progress.addEventListener("click",(e)=>{
  const width=progress.clientWidth;
  audio.currentTime=(e.offsetX/width)*audio.duration;
});

/* AUTO NEXT */
audio.addEventListener("ended",()=>nextBtn.click());

/* VOLUME */
volume.oninput=()=>audio.volume=volume.value;

/* FORMAT TIME */
function formatTime(time){
  if(isNaN(time)) return "0:00";
  const m=Math.floor(time/60);
  const s=Math.floor(time%60).toString().padStart(2,"0");
  return `${m}:${s}`;
}
</script>

</body>
</html>
